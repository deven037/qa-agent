name: Build and Deploy (Staging)

on:
  push:
    branches:
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.STAGING_URL }}
            AUTH_URL=${{ secrets.STAGING_URL }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VM via SSH (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the staging image
            docker pull ghcr.io/${{ github.repository }}:staging

            # Write staging env file
            printf '%s\n' \
              'NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'NEXTAUTH_URL=${{ secrets.STAGING_URL }}' \
              'AUTH_URL=${{ secrets.STAGING_URL }}' \
              'MONGODB_URI=${{ secrets.MONGODB_URI }}' \
              'GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY_1 }}' \
              'GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}' \
              'GROQ_API_KEY_1=${{ secrets.GROQ_API_KEY_1 }}' \
              'GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY_2 }}' \
              'JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}' \
              'JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}' \
              'JIRA_ADMIN_EMAIL=${{ secrets.JIRA_ADMIN_EMAIL }}' \
              'NEXT_PUBLIC_JIRA_BASE_URL=${{ secrets.NEXT_PUBLIC_JIRA_BASE_URL }}' \
              'CEREBRAS_API_KEY_1=${{ secrets.CEREBRAS_API_KEY_1 }}' \
              'OPENROUTER_API_KEY_1=${{ secrets.OPENROUTER_API_KEY_1 }}' \
              'TOGETHER_API_KEY_1=${{ secrets.TOGETHER_API_KEY_1 }}' \
              'SAMBANOVA_API_KEY_1=${{ secrets.SAMBANOVA_API_KEY }}' \
              > /home/${{ secrets.VM_USER }}/.env.staging

            # Stop old staging container
            docker stop qa-agent-staging || true
            docker rm qa-agent-staging || true

            # Start new staging container on port 3001
            docker run -d \
              --name qa-agent-staging \
              --restart unless-stopped \
              -p 3001:3000 \
              --dns 8.8.8.8 \
              --dns 8.8.4.4 \
              --env-file /home/${{ secrets.VM_USER }}/.env.staging \
              ghcr.io/${{ github.repository }}:staging

            # Clean up old images
            docker image prune -f

            # Smoke test — wait for server
            echo "Waiting for staging server to start..."
            for i in $(seq 1 24); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/auth/csrf || true)
              if [ "$STATUS" = "200" ]; then
                echo "Staging server is up (attempt $i)"
                break
              fi
              echo "Attempt $i: got $STATUS, retrying..."
              sleep 5
            done

            # Must return 200 from CSRF endpoint
            CSRF_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/auth/csrf)
            if [ "$CSRF_STATUS" != "200" ]; then
              echo "SMOKE TEST FAILED: /api/auth/csrf returned $CSRF_STATUS (expected 200)"
              docker stop qa-agent-staging || true
              exit 1
            fi

            # Must NOT redirect login to error
            LOGIN_URL=$(curl -s -o /dev/null -w "%{url_effective}" -L http://localhost:3001/login)
            if echo "$LOGIN_URL" | grep -q "error="; then
              echo "SMOKE TEST FAILED: /login redirected to $LOGIN_URL"
              docker stop qa-agent-staging || true
              exit 1
            fi

            echo "Staging smoke tests passed. Live at ${{ secrets.STAGING_URL }}"
