name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            AUTH_URL=${{ secrets.NEXTAUTH_URL }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Write env file
            printf '%s\n' \
              'NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}' \
              'AUTH_URL=${{ secrets.NEXTAUTH_URL }}' \
              'MONGODB_URI=${{ secrets.MONGODB_URI }}' \
              'GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY_1 }}' \
              'GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}' \
              'GROQ_API_KEY_1=${{ secrets.GROQ_API_KEY_1 }}' \
              'GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY_2 }}' \
              'JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}' \
              'JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}' \
              'JIRA_ADMIN_EMAIL=${{ secrets.JIRA_ADMIN_EMAIL }}' \
              'NEXT_PUBLIC_JIRA_BASE_URL=${{ secrets.NEXT_PUBLIC_JIRA_BASE_URL }}' \
              'CEREBRAS_API_KEY_1=${{ secrets.CEREBRAS_API_KEY_1 }}' \
              'OPENROUTER_API_KEY_1=${{ secrets.OPENROUTER_API_KEY_1 }}' \
              'TOGETHER_API_KEY_1=${{ secrets.TOGETHER_API_KEY_1 }}' \
              > /home/${{ secrets.VM_USER }}/.env.production

            # Stop old container
            docker stop qa-agent || true
            docker rm qa-agent || true

            # Start new container with env file
            docker run -d \
              --name qa-agent \
              --restart unless-stopped \
              -p 3000:3000 \
              --dns 8.8.8.8 \
              --dns 8.8.4.4 \
              --env-file /home/${{ secrets.VM_USER }}/.env.production \
              ghcr.io/${{ github.repository }}:latest

            # Clean up old images
            docker image prune -f
