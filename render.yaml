services:
  - type: web
    name: qa-agent
    runtime: node
    buildCommand: apt-get update -y && apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 libgtk-3-0 && npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src npx playwright install chromium && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_ADMIN_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_JIRA_BASE_URL
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: OPENROUTER_API_KEY_1
        sync: false
      - key: TOGETHER_API_KEY_1
        sync: false
      - key: CEREBRAS_API_KEY_1
        sync: false
      - key: APP_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
