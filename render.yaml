services:
  - type: web
    name: qa-agent
    runtime: node
    buildCommand: npm install && npx playwright install chromium --with-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_ADMIN_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_JIRA_BASE_URL
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: OPENROUTER_API_KEY_1
        sync: false
      - key: TOGETHER_API_KEY_1
        sync: false
      - key: CEREBRAS_API_KEY_1
        sync: false
      - key: APP_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
